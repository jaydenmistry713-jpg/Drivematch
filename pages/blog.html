<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — DriveMatch</title>
  <meta name="description" content="Car reviews, buying guides, EV content, and honest industry commentary. Written by Jayden." />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<section class="page-header">
  <div class="container">
    <h1>The DriveMatch Blog</h1>
    <p>Car reviews, buying guides, EV content, and honest industry commentary. Written by Jayden — no sponsored content, no dealer kickbacks.</p>
  </div>
</section>

<main class="section">
  <div class="container">

    <!-- Category filters -->
    <div class="filter-chips" style="margin-bottom:40px;">
      <button class="filter-chip active" data-cat="" onclick="setCategory(this)">All Posts</button>
      <button class="filter-chip" data-cat="CAR_REVIEWS" onclick="setCategory(this)">Car Reviews</button>
      <button class="filter-chip" data-cat="BUYING_GUIDES" onclick="setCategory(this)">Buying Guides</button>
      <button class="filter-chip" data-cat="BEST_CARS" onclick="setCategory(this)">Best Cars</button>
      <button class="filter-chip" data-cat="EV_CONTENT" onclick="setCategory(this)">Electric Vehicles</button>
      <button class="filter-chip" data-cat="FINANCE" onclick="setCategory(this)">Finance</button>
      <button class="filter-chip" data-cat="INDUSTRY_NEWS" onclick="setCategory(this)">Industry News</button>
    </div>

    <!-- Featured label -->
    <div id="featured-label" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--slate-400);margin-bottom:16px;">Featured</div>

    <!-- Blog grid -->
    <div class="blog-grid" id="blog-grid">
      ${[1,2,3].map(() => `
        <div class="blog-card" style="pointer-events:none;">
          <div class="blog-card-img"><div class="skeleton" style="height:100%;border-radius:0;"></div></div>
          <div class="blog-card-body">
            <div class="skeleton" style="height:10px;width:60px;margin-bottom:10px;"></div>
            <div class="skeleton" style="height:16px;width:90%;margin-bottom:8px;"></div>
            <div class="skeleton" style="height:12px;margin-bottom:6px;"></div>
            <div class="skeleton" style="height:12px;width:75%;"></div>
          </div>
        </div>`).join('')}
    </div>

    <!-- Empty state (hidden) -->
    <div class="empty-state hidden" id="blog-empty">
      <div class="empty-state-icon">📰</div>
      <p>No posts in this category yet.</p>
    </div>

  </div>
</main>

<script src="../js/app.js"></script>
<script>
let currentCat = '';

async function loadPosts() {
  const grid = document.getElementById('blog-grid');
  const emptyEl = document.getElementById('blog-empty');
  const featuredLabel = document.getElementById('featured-label');

  try {
    const posts = await API.getBlogPosts(currentCat, 20);

    if (!posts || !posts.length) {
      grid.innerHTML = '';
      emptyEl.classList.remove('hidden');
      featuredLabel.classList.add('hidden');
      return;
    }

    emptyEl.classList.add('hidden');
    const featured = posts.filter(p => p.featured && !currentCat);
    const regular  = currentCat ? posts : posts.filter(p => !p.featured);

    featuredLabel.style.display = (featured.length && !currentCat) ? '' : 'none';

    grid.innerHTML = [...featured, ...regular].map(p => `
      <a href="post.html?slug=${p.slug}" class="blog-card">
        <div class="blog-card-img">
          ${p.coverImage ? `<img src="${p.coverImage}" alt="${p.title}" loading="lazy" />` : `<div style="width:100%;height:100%;background:var(--brand-100);display:flex;align-items:center;justify-content:center;font-size:32px;">🚗</div>`}
          <div class="blog-card-cat"><span class="badge cat-${p.category} badge-gray">${getCatLabel(p.category)}</span></div>
        </div>
        <div class="blog-card-body">
          <div class="blog-meta">
            <span>${p.author}</span>
            <span>·</span>
            <span>${p.readTime} min read</span>
            ${p.publishedAt ? `<span>·</span><span>${formatDate(p.publishedAt)}</span>` : ''}
          </div>
          <div class="blog-title">${p.title}</div>
          <div class="blog-excerpt">${p.excerpt}</div>
          <div class="blog-read-more">
            Read more
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
          </div>
        </div>
      </a>`).join('');
  } catch {
    grid.innerHTML = `<p style="color:var(--slate-400);">Failed to load posts.</p>`;
  }
}

function setCategory(btn) {
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  loadPosts();
}

document.addEventListener('DOMContentLoaded', loadPosts);
</script>
</body>
</html>
