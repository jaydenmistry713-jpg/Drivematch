[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["data/**"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/match"
  to = "/.netlify/functions/match"
  status = 200
